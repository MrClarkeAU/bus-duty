<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bus Duty – Sacred Heart College</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 16px;
    color: #1a1a2e;
  }

  .header {
    background: linear-gradient(135deg, #7b2d26, #a3362c);
    color: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(123, 45, 38, 0.3);
  }

  .header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 0.85rem;
    opacity: 0.85;
  }

  .status-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .counter {
    background: white;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    color: #444;
    flex: 1;
  }

  .counter span {
    color: #7b2d26;
    font-size: 1.3rem;
  }

  .sync-indicator {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-size: 0.8rem;
    font-weight: 600;
    color: #999;
  }

  .sync-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s ease;
  }

  .sync-dot.connected { background: #4caf50; }
  .sync-dot.disconnected { background: #f44336; }
  .sync-dot.connecting { background: #ff9800; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .bus-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bus-item {
    background: white;
    border-radius: 14px;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: all 0.25s ease;
    border: 2px solid transparent;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .bus-item:active {
    transform: scale(0.98);
  }

  .bus-item.checked {
    background: #e8f5e9;
    border-color: #4caf50;
  }

  .bus-item.checked .route-number {
    background: #4caf50;
  }

  .bus-item.checked .destination {
    color: #666;
    text-decoration: line-through;
    text-decoration-color: #999;
  }

  .bus-item.checked .arrival-time {
    display: block;
  }

  .checkbox-area {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 2.5px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s ease;
  }

  .bus-item.checked .checkbox-area {
    background: #4caf50;
    border-color: #4caf50;
  }

  .checkbox-area svg {
    width: 20px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .bus-item.checked .checkbox-area svg {
    opacity: 1;
  }

  .route-number {
    background: #7b2d26;
    color: white;
    font-weight: 800;
    font-size: 1.15rem;
    padding: 6px 12px;
    border-radius: 8px;
    min-width: 52px;
    text-align: center;
    flex-shrink: 0;
    transition: background 0.25s ease;
  }

  .dest-wrapper {
    flex: 1;
  }

  .destination {
    font-size: 0.88rem;
    font-weight: 500;
    color: #333;
    line-height: 1.3;
    transition: all 0.25s ease;
  }

  .arrival-time {
    display: none;
    font-size: 0.75rem;
    color: #4caf50;
    font-weight: 600;
    margin-top: 3px;
  }

  .bus-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease;
  }

  .btn:active { transform: scale(0.96); }

  .btn-reset {
    background: #e8e8e8;
    color: #555;
  }

  .all-done {
    text-align: center;
    padding: 20px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #4caf50;
    display: none;
  }

  .all-done.visible { display: block; }

  .timestamp {
    text-align: center;
    font-size: 0.8rem;
    color: #999;
    margin-top: 12px;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
    transition: opacity 0.3s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #7b2d26;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 0.95rem;
    color: #666;
    font-weight: 500;
  }

  /* Role toggle */
  .role-bar {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    gap: 8px;
  }

  .role-btn {
    flex: 1;
    padding: 12px 10px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: #f0f2f5;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: #888;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .role-btn .role-icon {
    font-size: 1.3rem;
    display: block;
    margin-bottom: 3px;
  }

  .role-btn.active-spotter {
    background: #fff3e0;
    border-color: #e6953a;
    color: #b36b00;
  }

  .role-btn.active-viewer {
    background: #e3f2fd;
    border-color: #5b9bd5;
    color: #1565c0;
  }

  .role-hint {
    text-align: center;
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 16px;
    padding: 0 8px;
  }

  /* Viewer mode: disable interaction on bus items */
  body.viewer-mode .bus-item {
    cursor: default;
    pointer-events: none;
  }

  body.viewer-mode .bus-item:active {
    transform: none;
  }

  body.viewer-mode .actions {
    display: none;
  }

  /* Notification flash */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: rgba(76, 175, 80, 0.95);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .flash-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .flash-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .flash-route {
    font-size: 3.5rem;
    font-weight: 800;
    color: white;
    background: rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 8px 32px;
    margin-bottom: 12px;
  }

  .flash-dest {
    font-size: 1.3rem;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
  }

  .flash-time {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.7);
  }

  .flash-dismiss {
    margin-top: 24px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
  }

  /* History section */
  .history-toggle {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #7b2d26;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .history-panel {
    display: none;
    margin-top: 12px;
  }

  .history-panel.open {
    display: block;
  }

  .history-day {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .history-day-header {
    font-size: 0.9rem;
    font-weight: 700;
    color: #7b2d26;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0f0f0;
  }

  .history-bus-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.85rem;
  }

  .history-bus-name {
    color: #333;
    font-weight: 500;
  }

  .history-bus-time {
    color: #4caf50;
    font-weight: 600;
  }

  .history-bus-time.missed {
    color: #999;
    font-weight: 400;
    font-style: italic;
  }

  .history-empty {
    text-align: center;
    color: #999;
    font-size: 0.9rem;
    padding: 24px 0;
  }

  .history-summary {
    font-size: 0.8rem;
    color: #999;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #f0f0f0;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting...</div>
</div>

<div class="header">
  <h1>🚌 Bus Duty Checklist</h1>
  <div class="subtitle">Sacred Heart College — After School (Live)</div>
</div>

<div class="role-bar">
  <button class="role-btn active-spotter" id="btnSpotter" onclick="setRole('spotter')">
    <span class="role-icon">👁️</span> Spotter
  </button>
  <button class="role-btn" id="btnViewer" onclick="setRole('viewer')">
    <span class="role-icon">👥</span> Viewer
  </button>
</div>
<div class="role-hint" id="roleHint">You can check off buses as they arrive.</div>

<div class="status-bar">
  <div class="counter">
    <span id="arrivedCount">0</span> of <span id="totalCount">7</span> arrived
  </div>
  <div class="sync-indicator">
    <div class="sync-dot connecting" id="syncDot"></div>
    <span id="syncText">Connecting</span>
  </div>
</div>

<div class="bus-list" id="busList"></div>

<div class="all-done" id="allDone">✅ All buses arrived!</div>

<div class="actions">
  <button class="btn btn-reset" onclick="resetAll()">Reset All</button>
</div>

<button class="history-toggle" id="historyToggle" onclick="toggleHistory()">📊 View Arrival History</button>

<div class="history-panel" id="historyPanel"></div>

<!-- Notification flash -->
<div class="flash-overlay" id="flashOverlay" onclick="dismissFlash()">
  <div class="flash-icon">🚌</div>
  <div class="flash-route" id="flashRoute">—</div>
  <div class="flash-dest" id="flashDest">—</div>
  <div class="flash-time" id="flashTime">—</div>
  <div class="flash-dismiss">Tap anywhere to dismiss</div>
</div>

<div class="timestamp" id="timestamp"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// =============================================================
// FIREBASE CONFIG — Replace the placeholder values below
// with your own Firebase project credentials.
// See the setup guide for instructions.
// =============================================================
const firebaseConfig = {
  apiKey: "AIzaSyCNWPjFkqcGZ8ktYKfV0Pjnb1JxDZQLScc",
  authDomain: "shc-bus-duty.firebaseapp.com",
  databaseURL: "https://shc-bus-duty-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shc-bus-duty",
  storageBucket: "shc-bus-duty.firebasestorage.app",
  messagingSenderId: "500819761964",
  appId: "1:500819761964:web:9d5637078035c95924ea89"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const busRef = db.ref('bus-duty');

// =============================================================
// BUS DATA
// =============================================================
const buses = [
  { id: "bus_423_warwick_stirling", route: "423", dest: "Warwick / Stirling Stn (Regular)" },
  { id: "bus_441_warwick",         route: "441", dest: "Warwick Stn" },
  { id: "bus_441_whitfords",       route: "441", dest: "Whitfords Stn" },
  { id: "bus_442_warwick",         route: "442", dest: "Warwick Stn" },
  { id: "bus_442_whitfords",       route: "442", dest: "Whitfords Stn" },
  { id: "bus_444_whitfords",       route: "444", dest: "Whitfords Stn" },
  { id: "bus_783_warwick",         route: "783", dest: "Warwick Stn (Special)" }
];

let state = {};
let previousState = {};
let currentRole = 'spotter';
let flashTimeout = null;
let historyOpen = false;
let isFirstLoad = true;

// =============================================================
// ROLE TOGGLE
// =============================================================
function setRole(role) {
  currentRole = role;
  const btnSpotter = document.getElementById('btnSpotter');
  const btnViewer = document.getElementById('btnViewer');
  const hint = document.getElementById('roleHint');

  if (role === 'spotter') {
    btnSpotter.className = 'role-btn active-spotter';
    btnViewer.className = 'role-btn';
    document.body.classList.remove('viewer-mode');
    hint.textContent = 'You can check off buses as they arrive.';
  } else {
    btnSpotter.className = 'role-btn';
    btnViewer.className = 'role-btn active-viewer';
    document.body.classList.add('viewer-mode');
    hint.textContent = 'View only \u2014 updates will appear automatically.';
  }
}

// =============================================================
// AUTO-RESET: Get today's date in Perth time (AWST = UTC+8)
// =============================================================
function getTodayPerth() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Australia/Perth' });
}

// =============================================================
// FIREBASE LISTENERS
// =============================================================

// Connection status
db.ref('.info/connected').on('value', (snap) => {
  const isConnected = snap.val() === true;
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (isConnected) {
    dot.className = 'sync-dot connected';
    text.textContent = 'Live';
  } else {
    dot.className = 'sync-dot disconnected';
    text.textContent = 'Offline';
  }
});

// Listen for data changes — this is where the live sync happens.
// When ANY teacher ticks a bus, every other open page updates instantly.
busRef.on('value', (snapshot) => {
  const data = snapshot.val() || {};

  // Auto-reset: if stored date doesn't match today (Perth time), clear everything
  if (data.date !== getTodayPerth()) {
    const freshState = { date: getTodayPerth() };
    buses.forEach(b => {
      freshState[b.id] = { arrived: false, time: null, timestamp: null };
    });
    busRef.set(freshState);
    return; // The set() will re-trigger this listener with clean data
  }

  state = data;
  
  // Detect newly arrived buses (skip on first load)
  if (!isFirstLoad) {
    buses.forEach(bus => {
      const prev = previousState[bus.id];
      const curr = state[bus.id];
      if (curr && curr.arrived && (!prev || !prev.arrived)) {
        showFlash(bus, curr.time);
        saveToHistory(bus, curr.time);
      }
    });
  }
  
  // Store current state for next comparison
  previousState = {};
  buses.forEach(bus => {
    if (state[bus.id]) {
      previousState[bus.id] = { arrived: state[bus.id].arrived, time: state[bus.id].time };
    }
  });
  isFirstLoad = false;

  render();
  document.getElementById('loadingOverlay').classList.add('hidden');
});

// =============================================================
// TOGGLE & RESET
// =============================================================
function toggle(busId) {
  const current = state[busId] || { arrived: false, time: null, timestamp: null };
  const nowArrived = !current.arrived;

  if (nowArrived && navigator.vibrate) navigator.vibrate(30);

  busRef.child(busId).set({
    arrived: nowArrived,
    time: nowArrived ? new Date().toLocaleTimeString('en-AU', {
      hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Perth'
    }) : null,
    timestamp: nowArrived ? Date.now() : null
  });
}

function resetAll() {
  const hasAny = buses.some(b => state[b.id]?.arrived);
  if (!hasAny) return;

  if (confirm('Reset all buses? This will clear everyone\'s view.')) {
    const freshState = { date: getTodayPerth() };
    buses.forEach(b => {
      freshState[b.id] = { arrived: false, time: null, timestamp: null };
    });
    busRef.set(freshState);
  }
}

// =============================================================
// RENDER
// =============================================================
function render() {
  const list = document.getElementById('busList');
  list.innerHTML = '';

  let arrivedCount = 0;

  // Sort: arrived buses first (most recent at top), then unarrived in original order
  const sorted = buses.slice().sort((a, b) => {
    const aState = state[a.id] || { arrived: false, timestamp: null };
    const bState = state[b.id] || { arrived: false, timestamp: null };

    if (aState.arrived && !bState.arrived) return -1;
    if (!aState.arrived && bState.arrived) return 1;
    if (aState.arrived && bState.arrived) {
      return (bState.timestamp || 0) - (aState.timestamp || 0); // most recent first
    }
    return 0; // preserve original order for unarrived
  });

  sorted.forEach((bus) => {
    const busState = state[bus.id] || { arrived: false, time: null };
    if (busState.arrived) arrivedCount++;

    const item = document.createElement('div');
    item.className = 'bus-item' + (busState.arrived ? ' checked' : '');
    item.onclick = () => toggle(bus.id);
    item.innerHTML = `
      <div class="checkbox-area">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="bus-info">
        <div class="route-number">${bus.route}</div>
        <div class="dest-wrapper">
          <div class="destination">${bus.dest}</div>
          <div class="arrival-time">${busState.time ? 'Arrived ' + busState.time : ''}</div>
        </div>
      </div>
    `;
    list.appendChild(item);
  });

  document.getElementById('arrivedCount').textContent = arrivedCount;
  document.getElementById('allDone').className = 'all-done' + (arrivedCount === buses.length ? ' visible' : '');
}

// =============================================================
// NOTIFICATION FLASH
// =============================================================
function showFlash(bus, timeStr) {
  // Only show flash in viewer mode, or if phone is in pocket
  // Show for both modes but especially prominent for viewer
  const overlay = document.getElementById('flashOverlay');
  document.getElementById('flashRoute').textContent = bus.route;
  document.getElementById('flashDest').textContent = bus.dest;
  document.getElementById('flashTime').textContent = timeStr ? 'Arrived at ' + timeStr : '';

  overlay.classList.add('active');
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => {
    overlay.classList.remove('active');
  }, 4000);
}

function dismissFlash() {
  clearTimeout(flashTimeout);
  document.getElementById('flashOverlay').classList.remove('active');
}

// =============================================================
// HISTORY LOG
// =============================================================
const historyRef = db.ref('bus-duty-history');

function saveToHistory(bus, timeStr) {
  const today = getTodayPerth();
  historyRef.child(today).child(bus.id).set({
    route: bus.route,
    dest: bus.dest,
    time: timeStr,
    timestamp: Date.now()
  });
}

function toggleHistory() {
  historyOpen = !historyOpen;
  const panel = document.getElementById('historyPanel');
  const btn = document.getElementById('historyToggle');

  if (historyOpen) {
    panel.classList.add('open');
    btn.textContent = '📊 Hide Arrival History';
    loadHistory();
  } else {
    panel.classList.remove('open');
    btn.textContent = '📊 View Arrival History';
  }
}

function loadHistory() {
  const panel = document.getElementById('historyPanel');
  panel.innerHTML = '<div class="history-empty">Loading...</div>';

  historyRef.orderByKey().limitToLast(14).once('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      panel.innerHTML = '<div class="history-empty">No history recorded yet.</div>';
      return;
    }

    // Sort dates newest first
    const dates = Object.keys(data).sort().reverse();
    let html = '';

    dates.forEach(date => {
      const dayData = data[date];
      const dateObj = new Date(date + 'T00:00:00');
      const dateLabel = dateObj.toLocaleDateString('en-AU', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });

      // Sort buses by timestamp
      const dayBuses = Object.values(dayData).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      const arrivedCount = dayBuses.length;

      let firstTime = null;
      let lastTime = null;

      let rows = '';
      // Show all buses — matched and unmatched
      buses.forEach(bus => {
        const record = dayData[bus.id];
        if (record && record.time) {
          rows += '<div class="history-bus-row">' +
            '<span class="history-bus-name">' + record.route + ' \u2014 ' + record.dest + '</span>' +
            '<span class="history-bus-time">' + record.time + '</span>' +
            '</div>';
          if (!firstTime) firstTime = record.time;
          lastTime = record.time;
        } else {
          rows += '<div class="history-bus-row">' +
            '<span class="history-bus-name">' + bus.route + ' \u2014 ' + bus.dest + '</span>' +
            '<span class="history-bus-time missed">Not recorded</span>' +
            '</div>';
        }
      });

      let summary = arrivedCount + ' of ' + buses.length + ' buses recorded';
      if (firstTime && lastTime && firstTime !== lastTime) {
        summary += ' \u00B7 First: ' + firstTime + ' \u00B7 Last: ' + lastTime;
      }

      html += '<div class="history-day">' +
        '<div class="history-day-header">' + dateLabel + '</div>' +
        rows +
        '<div class="history-summary">' + summary + '</div>' +
        '</div>';
    });

    panel.innerHTML = html;
  });
}

// =============================================================
// CLOCK
// =============================================================
function updateTime() {
  const now = new Date();
  document.getElementById('timestamp').textContent =
    now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Australia/Perth' }) +
    ' \u2014 ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Perth' });
}
updateTime();
setInterval(updateTime, 30000);
</script>
